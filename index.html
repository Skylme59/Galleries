<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fallen Angels: MechFallen - Galerie NFT cyberpunk-gothique">
    <title>Fallen Angels: MechFallen • Galerie NFT</title>
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="Fallen Angels: MechFallen">
    <meta property="og:description" content="Collection cyberpunk-gothique de séraphins mécaniques tombés">
    <meta property="og:image" content="https://i2c.seadn.io/collection/fallen-angels-mechfallen/image_type_hero_desktop/b08a3cd435d2c7c69baf1287eba187/acb08a3cd435d2c7c69baf1287eba187.jpeg?w=2000">
    <meta property="og:url" content="https://ton-domaine.vercel.app">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@skylme">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff00aa;
            --neon-crimson: #ff0033;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a001f 100%);
            font-family: 'Roboto Mono', monospace;
        }
        
        .neon-text {
            text-shadow: 0 0 20px var(--neon-cyan),
                         0 0 40px var(--neon-cyan),
                         0 0 60px var(--neon-magenta);
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 0 40px var(--neon-cyan),
                        0 0 60px var(--neon-magenta);
        }
        
        .hero-bg {
            background-image: url('https://i2c.seadn.io/collection/fallen-angels-mechfallen/image_type_hero_desktop/b08a3cd435d2c7c69baf1287eba187/acb08a3cd435d2c7c69baf1287eba187.jpeg?w=2000');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="text-white">

    <!-- NAVBAR -->
    <nav class="border-b border-white/10 bg-black/80 backdrop-blur-md fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i2c.seadn.io/collection/fallen-angels-mechfallen/image_type_logo/fa5f37c8575d1fccc7e39fb59c715c/25fa5f37c8575d1fccc7e39fb59c715c.jpeg?h=250&w=250" alt="Logo" class="w-10 h-10 rounded-full border-2 border-cyan-400">
                <h1 class="text-2xl font-bold tracking-widest neon-text">MECHFALLEN</h1>
            </div>
            
            <div class="flex items-center gap-8">
                <a href="#gallery" class="hover:text-cyan-400 transition">Galerie</a>
                <a href="https://opensea.io/collection/fallen-angels-mechfallen" target="_blank" class="flex items-center gap-2 hover:text-cyan-400 transition">
                    <i class="fas fa-external-link-alt"></i> OpenSea
                </a>
                <a href="https://x.com/skylme" target="_blank" class="flex items-center gap-2 hover:text-cyan-400 transition">
                    <i class="fab fa-x-twitter"></i> @skylme
                </a>
            </div>
            
            <!-- Bouton partage global -->
            <button onclick="shareSite()" class="bg-gradient-to-r from-cyan-400 to-magenta-500 text-black font-bold px-6 py-2 rounded-full flex items-center gap-2 hover:scale-105 transition">
                <i class="fas fa-share-alt"></i> Partager
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg h-screen flex items-center relative">
        <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/90 to-black"></div>
        <div class="max-w-5xl mx-auto px-6 relative z-10 text-center">
            <h2 class="text-6xl md:text-8xl font-black tracking-tighter neon-text mb-4">FALLEN ANGELS</h2>
            <h3 class="text-4xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-magenta-500 to-red-500 mb-8">MECHFALLEN</h3>
            <p class="text-xl md:text-2xl max-w-2xl mx-auto mb-10 opacity-90">
                Séraphins mécaniques tombés entre cyberpunk et ténèbres gothiques.<br>
                Lumière et obscurité en équilibre fragile.
            </p>
            <div class="flex flex-col sm:flex-row gap-6 justify-center">
                <a href="#gallery" class="px-10 py-5 bg-white text-black font-bold text-lg rounded-2xl hover:bg-cyan-400 transition flex items-center justify-center gap-3">
                    <i class="fas fa-eye"></i> Explorer la Galerie
                </a>
                <a href="https://opensea.io/collection/fallen-angels-mechfallen" target="_blank" 
                   class="px-10 py-5 border-2 border-white hover:border-cyan-400 text-white font-bold text-lg rounded-2xl flex items-center justify-center gap-3">
                    <i class="fas fa-store"></i> Acheter sur OpenSea
                </a>
            </div>
        </div>
        
        <!-- Scroll indicator -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
            <i class="fas fa-chevron-down text-4xl animate-bounce"></i>
        </div>
    </section>

    <!-- GALERIE -->
    <section id="gallery" class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex justify-between items-end mb-12">
            <h2 class="text-5xl font-bold neon-text">Collection • MechFallen</h2>
            <p id="count" class="text-cyan-400 text-xl"></p>
        </div>

        <div id="nft-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- Rempli dynamiquement par JS -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-black/90 border-t border-white/10 py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm opacity-70 mb-4">Créé par @skylme • Fallen Angels: MechFallen © 2026</p>
            <div class="flex justify-center gap-8 text-2xl">
                <a href="https://x.com/skylme" target="_blank" class="hover:text-cyan-400"><i class="fab fa-x-twitter"></i></a>
                <a href="#" onclick="shareSite()" class="hover:text-cyan-400"><i class="fas fa-share-alt"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // CONFIG Tailwind
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: { extend: {} }
            }
        }

        // Fetch NFTs depuis OpenSea (auto, toujours à jour)
        async function loadNFTs() {
            const grid = document.getElementById('nft-grid');
            grid.innerHTML = `<div class="col-span-full text-center py-12"><i class="fas fa-spinner fa-spin text-4xl text-cyan-400"></i><p class="mt-4">Chargement des MechFallen...</p></div>`;
            
            try {
                const res = await fetch('https://api.opensea.io/api/v2/collection/fallen-angels-mechfallen/nfts?limit=20');
                const data = await res.json();
                
                grid.innerHTML = '';
                document.getElementById('count').textContent = `${data.nfts.length} séraphins mécaniques`;

                data.nfts.forEach(nft => {
                    const card = document.createElement('div');
                    card.className = `card bg-zinc-950 border border-white/10 rounded-3xl overflow-hidden`;
                    card.innerHTML = `
                        <div class="relative">
                            <img src="${nft.image_url || 'https://i2c.seadn.io/collection/fallen-angels-mechfallen/image_type_logo/fa5f37c8575d1fccc7e39fb59c715c/25fa5f37c8575d1fccc7e39fb59c715c.jpeg'}" 
                                 class="w-full h-64 object-cover" alt="${nft.name}">
                            <div class="absolute top-4 right-4 bg-black/70 text-xs px-3 py-1 rounded-full border border-cyan-400">
                                #${nft.identifier}
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-xl mb-2 line-clamp-2">${nft.name || 'Fallen Seraph'}</h3>
                            <a href="${nft.permalink || 'https://opensea.io/collection/fallen-angels-mechfallen'}" 
                               target="_blank" 
                               class="inline-flex items-center gap-2 text-cyan-400 hover:text-white text-sm">
                                Voir sur OpenSea <i class="fas fa-external-link-alt"></i>
                            </a>
                            
                            <!-- Bouton partage NFT -->
                            <button onclick="shareNFT('${nft.name}', '${nft.permalink || 'https://opensea.io/collection/fallen-angels-mechfallen'}')" 
                                    class="float-right text-cyan-400 hover:text-white">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-400">Erreur de chargement OpenSea. Vérifie ta connexion.</div>`;
            }
        }

        // Partager la galerie entière
        function shareSite() {
            const text = "Découvrez Fallen Angels: MechFallen – ma collection cyberpunk-gothique sur OpenSea ! 🔥 @skylme";
            const url = window.location.href;
            window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        }

        // Partager un NFT spécifique
        function shareNFT(name, link) {
            const text = `Je viens de découvrir "${name}" dans la collection MechFallen ! 🔥 @skylme`;
            window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(link)}`, '_blank');
        }

        // Lancement
        window.onload = () => {
            initTailwind();
            loadNFTs();
        };
    </script>
</body>
</html>
