<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie NFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --accent: #7b2ff7;
            --accent-glow: rgba(123, 47, 247, 0.4);
            --accent-secondary: #00d4ff;
            --text-primary: #f0f0f0;
            --text-secondary: #8888aa;
            --border: rgba(255, 255, 255, 0.06);
            --gradient-1: linear-gradient(135deg, #7b2ff7, #00d4ff);
            --gradient-2: linear-gradient(135deg, #f72f8e, #7b2ff7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-orbs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb:nth-child(1) {
            width: 400px; height: 400px;
            background: var(--accent);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 350px; height: 350px;
            background: var(--accent-secondary);
            bottom: -100px; right: -100px;
            animation-delay: -7s;
        }

        .orb:nth-child(3) {
            width: 300px; height: 300px;
            background: #f72f8e;
            top: 50%; left: 50%;
            animation-delay: -14s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -50px) scale(1.1); }
            50% { transform: translate(-50px, 100px) scale(0.9); }
            75% { transform: translate(80px, 60px) scale(1.05); }
        }

        /* ===== HEADER / NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0; right: 0;
            height: 2px;
            background: var(--gradient-1);
            border-radius: 2px;
        }

        .connect-btn {
            padding: 0.6rem 1.5rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 50px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            z-index: 1;
            padding: 10rem 2rem 4rem;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: rgba(123, 47, 247, 0.15);
            border: 1px solid rgba(123, 47, 247, 0.3);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .hero h1 .gradient-text {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            max-width: 550px;
            margin: 0 auto 2.5rem;
            line-height: 1.6;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* ===== FILTER BAR ===== */
        .filter-section {
            position: relative;
            z-index: 1;
            padding: 0 2rem;
            max-width: 1400px;
            margin: 0 auto 2rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.55rem 1.4rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            gap: 0.5rem;
            min-width: 250px;
            transition: border-color 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent);
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            width: 100%;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        /* ===== NFT GRID ===== */
        .gallery-section {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* ===== NFT CARD ===== */
        .nft-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }

        .nft-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(123, 47, 247, 0.2);
        }

        .nft-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .nft-card:hover::before {
            opacity: 1;
        }

        .nft-image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .nft-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .nft-card:hover .nft-image-wrapper img {
            transform: scale(1.08);
        }

        .nft-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 0.3rem 0.8rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .nft-like {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px; height: 36px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.3s;
        }

        .nft-like:hover,
        .nft-like.liked {
            background: #f72f8e;
            transform: scale(1.15);
        }

        .nft-info {
            padding: 1.2rem;
        }

        .nft-collection {
            font-size: 0.78rem;
            color: var(--accent-secondary);
            font-weight: 500;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .verified-icon {
            width: 14px; height: 14px;
            background: var(--accent-secondary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        .nft-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .nft-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .price-section {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .eth-icon {
            width: 12px;
            height: 12px;
            background: var(--gradient-1);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .buy-btn {
            padding: 0.5rem 1.2rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            max-height: 90vh;
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-details {
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .modal-close {
            align-self: flex-end;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: var(--accent);
        }

        .modal-collection {
            color: var(--accent-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .modal-desc {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .modal-properties {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
        }

        .property {
            background: rgba(123, 47, 247, 0.08);
            border: 1px solid rgba(123, 47, 247, 0.2);
            border-radius: 12px;
            padding: 0.7rem;
            text-align: center;
        }

        .property-type {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .property-value {
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .modal-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 16px;
        }

        .modal-buy-btn {
            padding: 0.8rem 2rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .modal-buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        /* ===== FOOTER ===== */
        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nft-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
            .modal { grid-template-columns: 1fr; }
            .modal-image { max-height: 300px; }
            .hero-stats { gap: 1.5rem; }
        }

        /* ===== LOADER ===== */
        .loader {
            display: flex;
            justify-content: center;
            padding: 3rem;
        }

        .loader .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 6px;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loader .dot:nth-child(2) { animation-delay: 0.2s; }
        .loader .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
